name: Deploy Docs
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Hexo
        run: |
          cd hexo
          npm install

      - name: Generate Docs
        run: |
          cd hexo
          ls -la themes/doku/
          cat themes/doku/_config.yml
          npx hexo generate

      - name: Commit Docs
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add docs/ --force
          git commit -m "Auto-generated docs [skip ci]" || echo "No changes to commit"
          git push
